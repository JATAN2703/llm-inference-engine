# Builds the CPU serving image on Cloud Build (no local Docker needed).
# Usage:
#   gcloud builds submit --config deploy/cloudbuild-cpu.yaml --substitutions _IMAGE=<image>
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deploy/Dockerfile.cpu", "-t", "${_IMAGE}", "."]
images:
  - "${_IMAGE}"
options:
  machineType: E2_HIGHCPU_8        # faster build for the torch install layer
timeout: 1800s                     # torch CPU wheel install can be slow
