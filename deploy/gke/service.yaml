apiVersion: v1
kind: Service
metadata:
  name: inference-engine
spec:
  type: LoadBalancer        # GKE provisions an external IP so you can hit it from your laptop
  selector:
    app: inference-engine   # routes to the deployment's pods
  ports:
    - port: 80              # external port
      targetPort: 8000      # container port (uvicorn)
      protocol: TCP
